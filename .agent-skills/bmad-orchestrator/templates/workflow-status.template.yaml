# BMAD Method Workflow Status
# Generated: {{TIMESTAMP}}
# Project: {{PROJECT_NAME}}

# Project Information
project_name: "{{PROJECT_NAME}}"
project_type: "{{PROJECT_TYPE}}"
project_level: {{PROJECT_LEVEL}}
communication_language: "English"
output_language: "English"
last_updated: "{{TIMESTAMP}}"

# Workflow Status Tracking
# Status values:
#   - "required" - Must be completed to proceed
#   - "recommended" - Strongly suggested but not blocking
#   - "optional" - Can be skipped without impact
#   - "{file-path}" - Completed (path to output file)
#   - "skipped" - Explicitly skipped by user

workflow_status:
  # ============================================================
  # Phase 1: Analysis (Optional but recommended)
  # ============================================================
  - name: product-brief
    phase: 1
    status: "optional"
    description: "Create comprehensive product brief with vision and high-level requirements"
    command: "/product-brief"

  - name: brainstorm-project
    phase: 1
    status: "optional"
    description: "Structured brainstorming session for features and solutions"
    command: "/brainstorm"

  - name: research
    phase: 1
    status: "optional"
    description: "Market analysis, competitive research, and technical investigation"
    command: "/research"

  # ============================================================
  # Phase 2: Planning (Required - choose based on project level)
  # ============================================================
  - name: prd
    phase: 2
    status: "{{PRD_STATUS}}"  # required for level 2+, recommended for level 1, optional for level 0
    description: "Product Requirements Document - comprehensive requirements for multi-feature projects"
    command: "/prd"
    notes: "Use for Level 2+ projects or when stakeholder alignment needed"

  - name: tech-spec
    phase: 2
    status: "{{TECH_SPEC_STATUS}}"  # required for level 0-1, optional for level 2+
    description: "Technical Specification - detailed technical design for implementation"
    command: "/tech-spec"
    notes: "Use for Level 0-1 projects or as supplement to PRD"

  - name: create-ux-design
    phase: 2
    status: "optional"
    description: "UX/UI design workflow with wireframes and user flows"
    command: "/create-ux-design"
    notes: "Recommended for user-facing features"

  # ============================================================
  # Phase 3: Solutioning (Required for Level 2+)
  # ============================================================
  - name: architecture
    phase: 3
    status: "{{ARCHITECTURE_STATUS}}"  # required for level 2+, optional for level 0-1
    description: "System architecture design with components and integrations"
    command: "/architecture"
    notes: "Required for Level 2+ projects with architectural complexity"

  - name: solutioning-gate-check
    phase: 3
    status: "optional"
    description: "Validate architecture against requirements before implementation"
    command: "/solutioning-gate-check"
    notes: "Recommended for Level 3+ projects"

  # ============================================================
  # Phase 3: TEA Workflows (Testing & Quality Assurance)
  # ============================================================
  # TEA (Test Architecture) workflows run in parallel with or after Architecture.
  # These ensure quality is built into the solution from the design phase.

  - name: tea-discovery
    phase: 3
    status: "optional"
    description: "Discover TEA workflows for your project"
    command: "/tea-discovery"
    notes: "Use first time to explore TEA capabilities"

  - name: tea-tmt
    phase: 3
    status: "optional"
    description: "Teach Me Testing - 7-session fundamental course"
    command: "/tea-tmt"
    notes: "Recommended for team members new to testing"

  - name: tea-tf
    phase: 3
    status: "{{TEA_TF_STATUS}}"  # conditional based on project level
    description: "Test Framework setup and scaffolding"
    command: "/tea-tf"
    notes: "Required for Level 1+, optional for Level 0"

  - name: tea-td
    phase: 3
    status: "{{TEA_TD_STATUS}}"  # conditional based on project level
    description: "Risk-based Test Design"
    command: "/tea-td"
    notes: "Required for Level 2+, optional for Level 1"

  - name: tea-ci
    phase: 3
    status: "optional"
    description: "CI/CD Quality Gates configuration"
    command: "/tea-ci"
    notes: "Recommended for projects with CI/CD"

  # ============================================================
  # Phase 4: Implementation (Required)
  # ============================================================
  # Note: Implementation progress is tracked in sprint-status.yaml
  # The workflows below are the entry points to Phase 4

  - name: sprint-planning
    phase: 4
    status: "required"
    description: "Break down requirements into epics and stories, create sprint plan"
    command: "/sprint-planning"
    notes: "Creates sprint-status.yaml and story files"

  - name: create-story
    phase: 4
    status: "conditional"
    description: "Create individual user story with acceptance criteria"
    command: "/create-story"
    notes: "Use to add stories to existing sprint"

  - name: dev-story
    phase: 4
    status: "conditional"
    description: "Implement specific user story with code generation"
    command: "/dev-story"
    notes: "Execute story implementation"

  - name: code-review
    phase: 4
    status: "optional"
    description: "Review implemented code for quality and standards"
    command: "/code-review"
    notes: "Recommended for Level 2+ projects"

  # ============================================================
  # Phase 4: TEA Workflows (Implementation Testing)
  # ============================================================
  # These TEA workflows are executed during implementation phase
  # to ensure quality throughout the development cycle.

  - name: tea-at
    phase: 4
    status: "{{TEA_AT_STATUS}}"  # conditional based on project level
    description: "ATDD - Acceptance Test-Driven Development"
    command: "/tea-at"
    notes: "Required for Level 1+, use before each story"

  - name: tea-ta
    phase: 4
    status: "{{TEA_TA_STATUS}}"  # conditional based on project level
    description: "Test Automation"
    command: "/tea-ta"
    notes: "Required for Level 1+, automate tests after implementation"

  - name: tea-rv
    phase: 4
    status: "optional"
    description: "Test Review with 0-100 scoring"
    command: "/tea-rv"
    notes: "Recommended for quality assurance"

  - name: tea-nr
    phase: 4
    status: "optional"
    description: "NFR Assessment"
    command: "/tea-nr"
    notes: "Recommended for performance-critical projects"

  - name: tea-tr
    phase: 4
    status: "optional"
    description: "Traceability matrix"
    command: "/tea-tr"
    notes: "Recommended for compliance requirements"

# ============================================================
# Status Legend
# ============================================================
# required              - Must be completed before proceeding to next phase
# recommended           - Strongly suggested for project quality
# optional              - Can be skipped based on project needs
# conditional           - Required based on context (e.g., sprint active, project level)
# {file-path}           - Workflow completed, shows output document
# skipped               - User explicitly chose to skip this workflow
#
# plannotator_review    - "approved" | "pending" | "changes-requested"
# reviewed_at           - ISO 8601 timestamp of last plannotator review
#
# TEA Workflows:
#   Phase 3 TEA (Solutioning Phase) - Run parallel with or after Architecture:
#     - tea-discovery: "optional" - Discover TEA workflows
#     - tea-tmt: "optional" - Teach Me Testing course
#     - tea-tf: "required" for Level 1+, "optional" for Level 0 - Test Framework setup
#     - tea-td: "required" for Level 2+, "optional" for Level 1 - Risk-based Test Design
#     - tea-ci: "optional" - CI/CD Quality Gates
#   Phase 4 TEA (Implementation Phase) - Run during development:
#     - tea-at: "required" for Level 1+, "optional" for Level 0 - ATDD
#     - tea-ta: "required" for Level 1+, "optional" for Level 0 - Test Automation
#     - tea-rv: "optional" - Test Review with scoring
#     - tea-nr: "optional" - NFR Assessment
#     - tea-tr: "optional" - Traceability matrix
#
# Phase Gate Review (optional but recommended):
#   After completing any phase document, run:
#   bash scripts/phase-gate-review.sh <doc-file> "<title>"
#   This opens plannotator for review before transitioning to next phase.
#
# TEA + plannotator Integration:
#   TEA workflows can also be reviewed with plannotator:
#   bash scripts/phase-gate-review.sh docs/tea-*.md "<title>"

